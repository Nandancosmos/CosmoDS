theory:
  cosmo:
    external: !!python/name:model.CosmoBG ''
    provides:
    - angular_diameter_distance
    - comoving_angular_distance
    - Hubble
    - rdrag
likelihood:
  bao.desi_dr2:
    stop_at_error: false
  sn.desy5: null
params:
  H0:
    prior:
      min: 60
      max: 80
    proposal: 0.2
    ref: 67.4
    latex: H_0
  Omegab0:
    prior:
      min: 0.01
      max: 0.1
    ref: 0.049
    proposal: 0.0005
    latex: \Omega_b
  Omegam0:
    prior:
      min: 0.1
      max: 0.5
    ref: 0.315
    proposal: 0.005
    latex: \Omega_\mathrm{m}
  Mb:
    prior:
      min: -20
      max: -18
    ref: -19.24
    proposal: 0.01
    latex: \M_{b}
  x0:
    prior:
      min: 0
      max: 0.5
    proposal: 0.1
    ref: 0.01
    latex: x_0
  lambda0:
    prior:
      min: 0.0
      max: 2.0
    proposal: 0.1
    ref: 0.5
    latex: \lambda_0
  m: 2
  Omega_phi0:
    derived: 'lambda Omegam0: 1 - Omegam0'
    latex: \Omega_{\phi,0}
  w_phi0:
    derived: 'lambda x0, Omegam0: (2*x0**2 + Omegam0 - 1) / (1 - Omegam0)'
    latex: w_{\phi,0}
  rd:
    derived: 'lambda rdrag: rdrag'
    latex: r_d
  y0:
    derived: 'lambda x0, Omegam0: np.sqrt(max(0.0, 1.0 - x0**2 - Omegam0))'
    latex: y_0
sampler:
  mcmc:
    Rminus1_stop: 0.02
    burn_in: 40
output: test_run
